schema_version: 1

context:
  version: "1.56.2"

package:
  name: broot
  version: ${{ version }}

source:
  url: https://github.com/Canop/broot/archive/v${{ version }}.tar.gz
  sha256: 3e7be4252c76565f6d71b34bd07d26e1444b9ac2e1c8271c724f6e866fe75565

build:
  number: 2
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --features clipboard --root ${{ PREFIX }} --path .
      - if: win
        then:
          - cargo auditable install --locked --no-track --bins --features clipboard --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - broot --help
      - broot --version
  - package_contents:
      bin:
        - broot
      strict: true

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Broot is a better way to navigate directories, find files, and launch commands.
  description: |
    Broot is a high-performance terminal file manager and navigator designed to provide a comprehensive overview of
    large directory structures using a balanced, tree-based visualization. It enables users to instantly locate files
    through fuzzy searching, navigate deeply nested hierarchies without losing context, and perform file manipulations
    or custom shell commands directly from the interface.
  homepage: https://dystroy.org/broot/
  documentation: https://dystroy.org/broot/
  repository: https://github.com/Canop/broot
 
extra:
  recipe-maintainers:
    - dbast
